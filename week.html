<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KAIST 스타일 시간표</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="timetable-container">
      <h2>주간 시간표</h2>
      <table class="timetable" id="timetable">
        <thead>
          <tr>
            <th class="time-cell"></th>
            <th class="day-header">월요일</th>
            <th class="day-header">화요일</th>
            <th class="day-header">수요일</th>
            <th class="day-header">목요일</th>
            <th class="day-header">금요일</th>
            <th class="day-header">토요일</th>
            <th class="day-header">일요일</th>
          </tr>
        </thead>
        <tbody id="timetable-body">
          <!-- 스크립트에서 시간표 내용이 생성됩니다 -->
        </tbody>
      </table>
    </div>

    <div class="color-palette">
      <div class="palette-label">강의 색상:</div>
      <div
        class="color-option"
        data-color="#ebccc0"
        style="background-color: #ebccc0"
      ></div>
      <div
        class="color-option selected"
        data-color="#dde5b6"
        style="background-color: #dde5b6"
      ></div>
      <div
        class="color-option"
        data-color="#faedcd"
        style="background-color: #faedcd"
      ></div>
      <div
        class="color-option"
        data-color="#d9bdf8"
        style="background-color: #d9bdf8"
      ></div>
      <div
        class="color-option"
        data-color="#a9cad0"
        style="background-color: #a9cad0"
      ></div>
      <div
        class="color-option"
        data-color="#e3e4fc"
        style="background-color: #e3e4fc"
      ></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
